ignoreGeneratedHeader = false
severity = "warning"
confidence = 0.8
errorCode = 1
warningCode = 1

# This repo uses the local Google Go style guide as the readability baseline.
# These rules focus on the parts that are lint-enforceable: naming, comments,
# basic API hygiene, and a few clarity-oriented simplifications.

[rule.comment-spacings]
# Enforces a space between the comment's indicator and the comment text.

[rule.context-as-argument]
# Enforces that context.Context is the first argument to a function.

[rule.context-keys-type]
# Enforces that context keys are of a custom type, not basic types like string.

[rule.empty-block]
# Warns on empty code blocks (if, else, for).

[rule.error-naming]
# Enforces that sentinel errors start with Err and error types end with Error.

[rule.error-strings]
# Enforces that error strings should not be capitalized or end with punctuation.

[rule.exported]
# Enforces that exported declarations must be documented.

[rule.if-return]
# Checks for redundant else-blocks when if-block ends with a return.

[rule.increment-decrement]
# Enforces that i++ / i-- are used instead of i += 1 / i -= 1.

[rule.package-comments]
# Enforces that every package has a package-level comment.

[rule.range]
# Warns when iterating over a collection using _ when not needed.

[rule.receiver-naming]
# Enforces consistent receiver names and avoids generic ones like "this" or "self".

[rule.superfluous-else]
# Prevents `else` block when the `if` block returns.

[rule.time-naming]
# Enforces that time-related variables use standard units (e.g. timeout time.Duration).

[rule.unexported-return]
# Warns when an exported function returns an unexported type.

[rule.unnecessary-stmt]
# Warns about unnecessary statements (like `return` at the end of a void function).

[rule.var-naming]
# Enforces correct variable naming conventions (camelCase, no underscores).

[rule.early-return]
# Enforces the guide's rule to keep the "happy path" left-aligned and return early.

[rule.indent-error-flow]
# Prevents `else { return err }` after an `if err != nil { return err }`.

[rule.blank-imports]
# Ensures blank imports (`import _ "pkg"`) are only used in main or test files.

[rule.redefines-builtin-id]
# Warns when a builtin identifier (e.g., `append`, `make`) is shadowed or redefined.

[rule.import-shadowing]
# Enforces the guide's strict rules around avoiding shadowing imported package names.

[rule.bool-literal-in-expr]
# Prevents unidiomatic code like `if isActive == true`.

[rule.error-return]
# Enforces that the `error` type is always the last return value in a function signature.

[rule.bare-return]
# Warns on bare (naked) returns. Google style guide requires explicit returns.

[rule.defer]
# Warns on defer statements inside loops, which can lead to resource exhaustion.

[rule.dot-imports]
# Enforces that dot imports are not used, per the Google Style Guide.

[rule.errorf]
# Check that fmt.Errorf uses %w to wrap errors when appropriate.

[rule.modifies-parameter]
# Warns when a value parameter is modified, which can be confusing.

[rule.modifies-value-receiver]
# Warns when a value receiver is modified, as changes won't be visible to the caller.

[rule.time-equal]
# Enforces the use of time.Equal instead of == for time.Time values.

[rule.use-any]
# Enforces the use of 'any' instead of 'interface{}' for clearer code.

[rule.var-declaration]
# Enforces that variables are declared in a simpler way, e.g., dropping redundant types.

[rule.waitgroup-by-value]
# Prevents passing sync.WaitGroup by value, which is almost always a mistake.

[rule.get-return]
# Enforces the guide's rule: "Function and method names should not use a Get or get prefix".

[rule.confusing-naming]
# Warns on identifiers that are confusingly named or named identically except for capitalization.

[rule.confusing-results]
# Warns if a function returns two or more unnamed parameters of the same type, as the guide suggests naming them for clarity.

[rule.package-directory-mismatch]
# Enforces the guide's rule that package names should match the containing directory name.

[rule.import-alias-naming]
# Enforces that import aliases should follow standard go naming conventions.

[rule.redundant-import-alias]
# Warns on import aliases that match the imported package name (violating the simplicity principle).

[rule.inefficient-map-lookup]
# Simplifies map lookups for concision.

[rule.string-of-int]
# Warns on suspicious casts from int to string, ensuring clarity.

[rule.struct-tag]
# Checks common struct tags like json, xml, yaml for correctness.

[rule.unnecessary-if]
# Helps maintain concision by identifying if-else statements that can be simplified.

[rule.useless-break]
# Helps maintain concision by warning on useless break statements.

[rule.useless-fallthrough]
# Helps maintain concision by warning on useless fallthrough statements.
