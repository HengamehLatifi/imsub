name: Main

on:
  push:
    branches:
      - main

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  fly-config:
    name: Fly config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: v0.4.19

      - name: Validate Fly config
        run: flyctl config validate --strict -c fly.toml
        env:
          FLY_ACCESS_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  checks:
    name: Checks (vet, build, test, integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Vet
        run: make vet

      - name: Build
        run: make build

      - name: Test with race detector and coverage
        run: go test -race -count=1 -covermode=atomic -coverprofile=coverage.out ./...

      - name: Generate coverage summary
        run: |
          go tool cover -func=coverage.out | tee coverage.txt
          go tool cover -html=coverage.out -o coverage.html
          total="$(tail -n1 coverage.txt | awk '{print $3}')"
          {
            echo "## Coverage"
            echo
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| Total coverage | ${total} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.txt
            coverage.html

      - name: Integration Tests
        run: make test-integration

  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10
          args: --fix=false

      - name: Format check
        run: make fmt-check

  actionlint:
    name: Workflow lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Lint GitHub Actions workflows
        uses: raven-actions/actionlint@v2

  vulncheck:
    name: Vulnerability check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run govulncheck
        run: make vuln

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to production
    needs: [fly-config, checks, lint, actionlint, vulncheck, gitleaks]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://imsub.fly.dev
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: v0.4.19

      - name: Deploy to Fly.io
        run: flyctl deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
