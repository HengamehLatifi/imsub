name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fly-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Validate Fly config
        run: flyctl config validate --strict -c fly.toml
        env:
          FLY_ACCESS_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  go-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Format check
        run: |
          gofmt -l . | tee /dev/stderr | (! read)

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test with race detector and coverage
        run: go test -race -count=1 -covermode=atomic -coverprofile=coverage.out ./...

      - name: Generate coverage summary
        run: |
          go tool cover -func=coverage.out | tee coverage.txt
          go tool cover -html=coverage.out -o coverage.html
          total="$(tail -n1 coverage.txt | awk '{print $3}')"
          {
            echo "## Coverage"
            echo
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| Total coverage | ${total} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.txt
            coverage.html

      - name: Integration Tests
        run: go test -race -count=1 -tags=integration ./tests/integration/...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Verify golangci-lint config
        run: golangci-lint config verify

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10

  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
